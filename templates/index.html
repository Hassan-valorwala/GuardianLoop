<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GuardianLoop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<div class="page">

  <!-- Topbar -->
  <nav class="topbar">
    <span class="brand">GuardianLoop</span>
    <span class="last-checked" id="lastChecked">Checking...</span>
  </nav>

  <!-- Hero -->
  <section class="hero" id="hero">
    <p class="eyebrow">Today's status</p>
    <h1 class="hero-status" id="heroStatus">—</h1>
    <p class="hero-reason" id="heroReason"></p>
    <p class="hero-sub" id="heroSub"></p>
  </section>

  <!-- Week strip -->
  <section class="week-section">
    <p class="section-label">Past 7 days</p>
    <div class="week-strip" id="weekStrip"></div>
  </section>

  <!-- Agent feed -->
  <section class="feed-section">
    <div class="feed-top">
      <p class="section-label">Agent log</p>
      <button class="check-btn" id="checkBtn" onclick="runAgent()">Check now</button>
    </div>
    <div class="feed" id="feed"></div>
  </section>

  <!-- Demo controls — secondary, at bottom -->
  <section class="demo-section">
    <p class="section-label">Demo controls</p>
    <div class="demo-btns">
      <button class="demo-btn" onclick="setDemo('normal')">Simulate normal day</button>
      <button class="demo-btn warn" onclick="setDemo('anomaly')">Simulate unusual day</button>
    </div>
  </section>

</div>

<script>
  function formatDate(str) {
    const d = new Date(str);
    return d.toLocaleDateString([], { month: "short", day: "numeric" });
  }

  function humanScore(score) {
    if (score >= 0.15)  return "Very routine";
    if (score >= 0.05)  return "Normal";
    if (score >= -0.09) return "Slightly unusual";
    if (score >= -0.13) return "Concerning";
    return "Very unusual";
  }

  function buildReason(data) {
    if (data.current_status === "normal") return "Activity patterns match the learned routine.";
    // Build reason from today's stats
    const today = data.days[data.days.length - 1];
    if (!today) return "Routine looks different from usual.";
    const events = today.total_activities;
    const score = today.score;
    if (events <= 3) return `Only ${events} activity events recorded today — significantly below normal.`;
    if (score < -0.13) return "Multiple routine patterns are missing today.";
    return "Today's activity is noticeably different from the usual routine.";
  }

  async function fetchStatus() {
    try {
      const res = await fetch("/api/status");
      const data = await res.json();
      if (data.error) return;

      const hero = document.getElementById("hero");
      const heroStatus = document.getElementById("heroStatus");
      const heroReason = document.getElementById("heroReason");
      const heroSub = document.getElementById("heroSub");
      const lastChecked = document.getElementById("lastChecked");

      const isAnomaly = data.current_status === "anomalous";
      hero.className = "hero " + (isAnomaly ? "anomalous" : "normal");
      heroStatus.textContent = isAnomaly ? "Unusual Activity" : "Routine Normal";
      heroReason.textContent = buildReason(data);
      heroSub.textContent = isAnomaly
        ? "Consider reaching out to check on them."
        : "No action needed.";

      const t = data.last_checked.split(" ")[1].slice(0,5);
      lastChecked.textContent = "Last checked " + t;

      // Week strip
      const strip = document.getElementById("weekStrip");
      strip.innerHTML = "";
      data.days.forEach(day => {
        const isAnom = day.status === "anomalous";
        const barH = Math.max(16, Math.min(72, (day.score + 0.15) * 240));
        const col = document.createElement("div");
        col.className = "day-col " + day.status;
        col.innerHTML = `
          <span class="day-date">${formatDate(day.date)}</span>
          <div class="bar-wrap">
            <div class="bar" style="height:${barH}px" title="Score: ${day.score}"></div>
          </div>
          <span class="day-score">${day.score}</span>
          <span class="day-dot ${day.status}">● ${isAnom ? "Unusual" : "Normal"}</span>
          <span class="day-events">${day.total_activities} events</span>
        `;
        strip.appendChild(col);
      });

    } catch(e) { console.error(e); }
  }

  async function fetchFeed() {
    try {
      const res = await fetch("/api/log");
      const data = await res.json();
      const feed = document.getElementById("feed");

      const humanize = (msg) => {
        if (msg.includes("ANOMALY DETECTED"))       return { text: "Unusual activity pattern detected.", type: "warn" };
        if (msg.includes("EMAIL ALERT SENT"))        return { text: "Family notified by email.", type: "warn" };
        if (msg.includes("already sent"))            return { text: "Family already notified today — no duplicate sent.", type: "info" };
        if (msg.includes("Status NORMAL"))           return { text: "Behavior pattern appears normal.", type: "ok" };
        if (msg.includes("Agent cycle started"))     return { text: "Agent started a new check.", type: "info" };
        if (msg.includes("Manual check"))            return { text: "Manual check triggered.", type: "info" };
        if (msg.includes("Agent cycle complete"))    return { text: "Check complete.", type: "info" };
        if (msg.includes("starting"))               return { text: "GuardianLoop is running.", type: "info" };
        if (msg.includes("Checking activity")) {
          const m = msg.match(/(\d+) events/);
          return { text: `${m ? m[1] : "?"} activity events recorded today.`, type: "info" };
        }
        if (msg.includes("Anomaly score")) {
          const m = msg.match(/-?\d+\.\d+/);
          const s = m ? parseFloat(m[0]) : 0;
          return { text: `Behavioral score: ${humanScore(s)}.`, type: "info" };
        }
        return { text: msg, type: "info" };
      };

      feed.innerHTML = [...data.log].reverse().map(line => {
        const match = line.match(/\[(.+?)\]\s(.+)/);
        if (!match) return "";
        const time = match[1].split(" ")[1];
        const { text, type } = humanize(match[2]);
        return `
          <div class="feed-row ${type}">
            <span class="feed-time">${time}</span>
            <span class="feed-msg">${text}</span>
          </div>`;
      }).join("");

    } catch(e) { console.error(e); }
  }

  async function runAgent() {
    const btn = document.getElementById("checkBtn");
    btn.textContent = "Checking...";
    btn.disabled = true;
    try {
      await fetch("/api/run-agent");
      await fetchStatus();
      await fetchFeed();
    } finally {
      btn.textContent = "Check now";
      btn.disabled = false;
    }
  }

  async function setDemo(mode) {
    const btns = document.querySelectorAll(".demo-btn");
    btns.forEach(b => b.disabled = true);
    await fetch(`/api/demo/${mode}`);
    await fetchStatus();
    await fetchFeed();
    btns.forEach(b => b.disabled = false);
  }

  fetchStatus();
  fetchFeed();
  setInterval(() => { fetchStatus(); fetchFeed(); }, 30000);
</script>
</body>
</html>
