<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GuardianLoop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>

  <div class="page">

    <!-- Top bar -->
    <nav class="topbar">
      <span class="brand">GuardianLoop</span>
      <span class="agent-pulse" id="agentPulse">
        <span class="pulse-dot"></span> Agent active
      </span>
    </nav>

    <!-- Hero — the one big answer -->
    <section class="hero" id="hero">
      <p class="hero-eyebrow">Current status</p>
      <h1 class="hero-status" id="heroStatus">—</h1>
      <p class="hero-sub" id="heroSub">Checking activity data...</p>
      <p class="hero-meta" id="heroMeta"></p>
    </section>

    <div class="divider"></div>

    <!-- 7 day strip -->
    <section class="week-section">
      <p class="section-label">Past 7 days</p>
      <div class="week-strip" id="weekStrip">
        <!-- filled by JS -->
      </div>
    </section>

    <div class="divider"></div>

    <!-- Agent feed -->
    <section class="feed-section">
      <div class="feed-header">
        <p class="section-label">Agent activity</p>
        <button class="check-btn" id="checkBtn" onclick="runAgent()">
          Check now
        </button>
      </div>
      <div class="feed" id="feed">
        <!-- filled by JS -->
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span>GuardianLoop · Autonomous Care Agent</span>
      <span id="footerTime"></span>
    </footer>

  </div>

  <script>
    function formatTime(iso) {
      if (!iso) return "—";
      const d = new Date(iso.replace(" ", "T"));
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function formatDate(str) {
      const d = new Date(str);
      return d.toLocaleDateString([], { month: "short", day: "numeric" });
    }

    function humanScore(score) {
      if (score >= 0.15) return "Very routine";
      if (score >= 0.05) return "Normal";
      if (score >= -0.09) return "Slightly unusual";
      if (score >= -0.13) return "Concerning";
      return "Very unusual";
    }

    async function fetchStatus() {
      try {
        const res = await fetch("/api/status");
        const data = await res.json();

        const hero = document.getElementById("hero");
        const heroStatus = document.getElementById("heroStatus");
        const heroSub = document.getElementById("heroSub");
        const heroMeta = document.getElementById("heroMeta");

        if (data.current_status === "anomalous") {
          hero.className = "hero anomalous";
          heroStatus.textContent = "Check in";
          heroSub.textContent = "Today's routine looks different from usual. It may be worth reaching out.";
        } else {
          hero.className = "hero normal";
          heroStatus.textContent = "Safe";
          heroSub.textContent = "Today's activity matches the usual routine. Everything looks normal.";
        }

        heroMeta.textContent = "Last checked at " + data.last_checked.split(" ")[1].slice(0,5);

        // Week strip
        const strip = document.getElementById("weekStrip");
        strip.innerHTML = "";
        data.days.forEach(day => {
          const col = document.createElement("div");
          col.className = "day-col " + day.status;

          const isAnomaly = day.status === "anomalous";
          col.innerHTML = `
            <span class="day-label">${formatDate(day.date)}</span>
            <div class="day-bar-wrap">
              <div class="day-bar" style="height:${Math.max(20, Math.min(80, (day.score + 0.15) * 250))}px"></div>
            </div>
            <span class="day-tag">${isAnomaly ? "Unusual" : "Normal"}</span>
            <span class="day-events">${day.total_activities} events</span>
          `;
          strip.appendChild(col);
        });

      } catch(e) {
        console.error(e);
      }
    }

    async function fetchFeed() {
      try {
        const res = await fetch("/api/log");
        const data = await res.json();
        const feed = document.getElementById("feed");

        feed.innerHTML = data.log.reverse().map(line => {
          // Parse timestamp and message
          const match = line.match(/\[(.+?)\]\s(.+)/);
          if (!match) return "";
          const time = match[1].split(" ")[1];
          const msg = match[2];

          let type = "info";
          let human = msg;

          if (msg.includes("ANOMALY DETECTED")) {
            type = "warn";
            human = "Unusual activity pattern detected — routine looks significantly different.";
          } else if (msg.includes("EMAIL ALERT SENT")) {
            type = "warn";
            human = "Family alert sent by email.";
          } else if (msg.includes("Status NORMAL")) {
            type = "ok";
            human = "Routine looks healthy. No concerns.";
          } else if (msg.includes("Agent cycle started")) {
            type = "info";
            human = "Agent started a new check.";
          } else if (msg.includes("Agent cycle complete")) {
            type = "info";
            human = "Check complete.";
          } else if (msg.includes("Checking activity")) {
            const match2 = msg.match(/(\d+) events/);
            const count = match2 ? match2[1] : "?";
            type = "info";
            human = `${count} activity events recorded for today.`;
          } else if (msg.includes("Anomaly score")) {
            const scoreMatch = msg.match(/-?\d+\.\d+/);
            const score = scoreMatch ? parseFloat(scoreMatch[0]) : 0;
            type = "info";
            human = `Behavioral score: ${humanScore(score)}`;
          } else if (msg.includes("starting")) {
            type = "info";
            human = "GuardianLoop agent is running.";
          }

          return `
            <div class="feed-row ${type}">
              <span class="feed-time">${time}</span>
              <span class="feed-msg">${human}</span>
            </div>
          `;
        }).join("");

        feed.scrollTop = 0;
      } catch(e) {
        console.error(e);
      }
    }

    async function runAgent() {
      const btn = document.getElementById("checkBtn");
      btn.textContent = "Checking...";
      btn.disabled = true;
      try {
        await fetch("/api/run-agent");
        await fetchStatus();
        await fetchFeed();
      } finally {
        btn.textContent = "Check now";
        btn.disabled = false;
      }
    }

    // Footer clock
    function updateClock() {
      document.getElementById("footerTime").textContent =
        new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    fetchStatus();
    fetchFeed();
    updateClock();
    setInterval(() => { fetchStatus(); fetchFeed(); }, 30000);
    setInterval(updateClock, 1000);
  </script>

</body>
</html>
